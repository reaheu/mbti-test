  <!-- دمج الأسئلة والدوال والمنطق في ملف واحد -->
  <script>
    // هنا يندمج كود questions.js
    const originalQuestions = [ /* ... كل الأسئلة كاملة ... */ ];

    // هنا يندمج كود functions.js
    const cognitiveFunctionsData = [ /* ... كل الوظائف الإدراكية ... */ ];

    // هنا يندمج كود logic.js + إصلاح XNTX
    function determineMBTI(results) {
      let E = results.E || 0, I = results.I || 0;
      let N = results.Ne + results.Ni;
      let S = results.Se + results.Si;
      let T = results.Te + results.Ti;
      let F = results.Fe + results.Fi;
      let J = results.Te + results.Fe + results.Ni + results.Si;
      let P = results.Ti + results.Fi + results.Ne + results.Se;

      const type = [
        E >= I ? "E" : "I",
        N >= S ? "N" : "S",
        T >= F ? "T" : "F",
        J >= P ? "J" : "P",
      ].join("");

      // منع ظهور XNTX أو غيره، إذا في تعادل واضح نعطي أقرب نمط
      return type.includes("X") ? "ENFP" : type;
    }

    // هنا يندمج كود main.js (عرض الأسئلة، الحفظ التلقائي، التفاعل، التحليل)
